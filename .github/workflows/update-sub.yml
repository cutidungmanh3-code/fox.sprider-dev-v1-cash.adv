name: Update Subscription

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and Rename Subscription
        run: |
          curl -s -H "User-Agent: Shadowrocket" "${{ secrets.ORIGINAL_SUB }}" -o sub.txt

          node -e '
            const fs = require("fs");
            let content = fs.readFileSync("sub.txt", "utf8").trim();

            if (!content.includes("vless://") && !content.includes("hysteria2://")) {
              content = Buffer.from(content, "base64").toString("utf8");
            }

            let lines = content.split("\n").filter(line => line.trim() !== "");

            lines = lines.map(line => {
              if (!line.includes("#")) return line;
              let [link, name = "Node"] = line.split("#", 2);
              name = name.trim();

              name = name
                .replace(/jp1|lxs1jp|lx-1jp/gi, "Japan")
                .replace(/lxs2jp|jp2/gi, "Japan 2")
                .replace(/lx-1sg|sg1/gi, "Singapore")
                .replace(/lx-us1|us1/gi, "USA")
                .replace(/gb-lx|gb1/gi, "UK");

              if (name.includes("Japan")) name = "🇯🇵 Japan";
              else if (name.includes("Singapore")) name = "🇸🇬 Singapore";
              else if (name.includes("USA")) name = "🇺🇸 USA";
              else if (name.includes("UK")) name = "🇬🇧 UK";
              else name = "🚀 " + name;

              name = name
                .replace(/\%[0-9A-Fa-f]{2}/g, " ")
                .replace(/\d+ms|\d+Gbps|Relay|Backup|Test/gi, "")
                .replace(/\s+/g, " ")
                .trim();

              return link + "#" + name;
            });

            let final = lines.join("\n");
            final = Buffer.from(final).toString("base64");
            fs.writeFileSync("sub.txt", final);
          '

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          git commit -m "Update sub - $(date)" || echo "No changes"
          git push
